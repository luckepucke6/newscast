name: Daily News Podcast

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 Stockholm sommartid (CEST = UTC+2)
  workflow_dispatch:
    inputs:
      force_episode2:
        description: 'Kör avsnitt 2 (AI & Teknik) oavsett veckodag'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Krävs för att committa seen_urls.json tillbaka

    steps:
      - name: Hämta kod
        uses: actions/checkout@v4

      - name: Sätt upp Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Generera och skicka podcast
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          AZURE_SPEECH_KEY:    ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          FORCE_EPISODE2:      ${{ github.event.inputs.force_episode2 }}
        run: python news_podcast.py

      - name: Spara historik till repot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json
          git diff --staged --quiet || git commit -m "Uppdatera historik [skip ci]"
          git push
