name: Daily News Podcast

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 Stockholm sommartid (CEST = UTC+2)
  workflow_dispatch:        # Kör manuellt från Actions-fliken för test

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Krävs för att committa seen_urls.json tillbaka

    steps:
      - name: Hämta kod
        uses: actions/checkout@v4

      - name: Sätt upp Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Generera och skicka podcast
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_podcast.py

      - name: Spara historik till repot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json
          git diff --staged --quiet || git commit -m "Uppdatera historik [skip ci]"
          git push
