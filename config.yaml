claude:
  model: "claude-sonnet-4-6"

azure_tts:
  region: "swedencentral"
  voices:
    ep1: "sv-SE-SofieNeural"   # Svensk kvinnlig röst — Världsnyheter & Sverige
    ep2: "sv-SE-MattiasNeural" # Svensk manlig röst  — AI & Teknik

episodes:
  ep1:
    label: "Världsnyheter & Sverige"
    min_words: 1000
    max_words: 1200
    target_minutes: 7
    max_articles: 10
    articles_per_feed: 8
    relevance_cutoff: 6
  ep2:
    label: "AI & Teknik"
    min_words: 1700
    max_words: 1900
    target_minutes: 11
    max_articles: 6
    articles_per_feed: 4

tech_days: [0, 2, 4]

dedup:
  similarity_threshold: 0.85

history:
  days: 7
  file: "seen_urls.json"
  memory_file: "topic_memory.json"

costs:
  alert_threshold_sek: 10.0
  claude_input_per_1k: 0.003
  claude_output_per_1k: 0.015
  usd_to_sek: 10.5

feeds:
  ep1:
    SVT: "https://www.svt.se/rss.xml"
    Omni: "https://omni.se/rss"
    DN: "https://www.dn.se/rss/"
    Aftonbladet: "https://rss.aftonbladet.se/rss2/small/pages/sections/senastenytt/"
    SR Ekot: "https://api.sr.se/api/rss/program/83"
    Reuters: "https://feeds.reuters.com/reuters/topNews"
    Sverige: "https://news.google.com/rss/search?q=Sverige&hl=sv&gl=SE&ceid=SE:sv"
    Världsnyheter: "https://news.google.com/rss/search?q=world+news+today&hl=en&gl=US&ceid=US:en"
    Politik: "https://news.google.com/rss/search?q=politics+world+today&hl=en&gl=US&ceid=US:en"
  ep2:
    The Verge: "https://www.theverge.com/rss/index.xml"
    Wired: "https://www.wired.com/feed/rss"
    Ars Technica: "https://feeds.arstechnica.com/arstechnica/index"
    MIT Tech Review: "https://www.technologyreview.com/feed/"
    TechCrunch: "https://techcrunch.com/feed/"
    VentureBeat: "https://venturebeat.com/feed/"
    Google AI: "https://news.google.com/rss/search?q=artificial+intelligence+technology&hl=en&gl=US&ceid=US:en"
